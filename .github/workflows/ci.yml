name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # CI runners vary; portable codegen instead of the repo-local native default
  RUSTFLAGS: ""

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo test -p sngram --features 12tb

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: crates/python
      - run: uv run pytest -q
        working-directory: crates/python
      - run: uv sync
        working-directory: train
      - run: uv run pytest -q
        working-directory: train

  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
      - run: uvx maturin build --release
        working-directory: crates/python
      - run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python target/wheels/sngram-*.whl
          /tmp/smoke/bin/python -c "
          import sngram
          table = sngram.weights()
          result = sngram.scan(table, b'fn main() {}')
          assert result.grams and result.summary.byte_len == 12
          assert sngram.query(table, 'main').op == 'and'
          print('wheel ok:', sngram.__version__)
          "

  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo-semver-checks
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: sngram-types, sngram
          feature-group: default-features
