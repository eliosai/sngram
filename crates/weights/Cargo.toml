[package]
name = "sngram-weights"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Pre-trained sparse n-gram weight tables, embedded at compile time and selectable per training-data tier via Cargo features."
license.workspace = true
repository.workspace = true
readme = "README.md"
keywords = ["ngram", "weights", "regex", "search", "code-search"]
categories = ["text-processing", "data-structures"]
publish = true

[dependencies]
sngram-types = { workspace = true }

[features]
# No table is minted yet for 0.5; the new schedule below fills in as the
# trainer produces tables. Minted sizes embed their bin; not-yet-minted
# sizes compile_error! when enabled.
default = []

"100gb" = []
"500gb" = []
"1tb" = []
"5tb" = []
"10tb" = []
"15tb" = []
"20tb" = []
"25tb" = []
"30tb" = []
"35tb" = []
"40tb" = []
"45tb" = []
"50tb" = []

[lints]
workspace = true
